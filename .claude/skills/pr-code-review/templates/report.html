<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{TITLE}}</title>
    <style>
/* {{CSS}} is replaced verbatim with the contents of github-markdown.css. */
{{CSS}}

/* Self-contained page wrapper. github-markdown.css scopes its variables
   to .markdown-body, so they don't propagate to <body>. Mirror the two
   theme backgrounds here with a media query so the page padding matches
   the article background in both light and dark mode. */
:root {
    color-scheme: light dark;
}
body {
    box-sizing: border-box;
    min-width: 200px;
    max-width: 980px;
    margin: 0 auto;
    padding: 32px;
    background: #ffffff;
    color: #1f2328;
}
@media (prefers-color-scheme: dark) {
    body {
        background: #0d1117;
        color: #f0f6fc;
    }
}
@media (max-width: 767px) {
    body {
        padding: 16px;
    }
}
    </style>
</head>
<body>
    <article class="markdown-body">
{{CONTENT}}
    </article>
</body>
</html>
